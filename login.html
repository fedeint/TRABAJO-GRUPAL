<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card p-8 rounded-2xl shadow-xl transition-all duration-300">
        <!-- Encabezado -->
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-12 h-12 rounded-lg flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800">Bienvenido</h2>
            <p class="text-slate-500 mt-2">Ingresa tus credenciales para continuar</p>
        </div>

        <!-- Mensajes de Estado -->
        <div id="statusMessage" class="hidden mb-4 p-3 rounded-lg text-sm font-medium text-center"></div>

        <!-- Formulario -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="admin"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    required
                >
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-600">
                    <input type="checkbox" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 mr-2">
                    Recordarme
                </label>
                <a href="#" class="text-blue-600 hover:underline font-medium">¿Olvidaste tu contraseña?</a>
            </div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-200 transform transition-active active:scale-[0.98]"
            >
                Iniciar Sesión
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500">
            ¿No tienes cuenta? <a href="#" class="text-blue-600 font-bold hover:underline">Regístrate</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const statusMessage = document.getElementById('statusMessage');

            // Función para mostrar mensajes sin usar alert()
            const showMessage = (text, isError = true) => {
                statusMessage.textContent = text;
                statusMessage.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
                
                if (isError) {
                    statusMessage.classList.add('bg-red-100', 'text-red-700');
                } else {
                    statusMessage.classList.add('bg-green-100', 'text-green-700');
                }
            };

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();

                // Validación simple de ejemplo
                // Usuario: admin | Contraseña: 123
                if (username === 'admin' && password === '123') {
                    showMessage('¡Inicio de sesión exitoso! Redirigiendo...', false);
                    
                    // Simular redirección
                    setTimeout(() => {
                        loginForm.innerHTML = `
                            <div class="text-center py-10">
                                <div class="text-5xl mb-4">🎉</div>
                                <h3 class="text-xl font-bold">¡Bienvenido de nuevo, ${username}!</h3>
                                <p class="text-slate-500 mt-2">Has ingresado correctamente al panel.</p>
                                <button onclick="location.reload()" class="mt-6 text-blue-600 font-medium">Cerrar sesión</button>
                            </div>
                        `;
                    }, 1500);
                } else {
                    showMessage('Credenciales incorrectas. Intenta con admin / 123');
                }
            });
        });
    </script>
</body>
</html>
