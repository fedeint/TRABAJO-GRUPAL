<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | GhostChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuración de Tailwind para soportar modo oscuro por clase
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .glass-card {
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <button id="themeToggle" class="fixed top-5 right-5 p-3 rounded-full bg-white dark:bg-slate-800 shadow-lg text-slate-600 dark:text-yellow-400 hover:scale-110 transition-transform">
        <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707.707m12.728 0l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
        <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </svg>
    </button>

    <div class="max-w-md w-full glass-card bg-white/90 dark:bg-slate-800/90 p-8 rounded-3xl shadow-2xl transition-all duration-300">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-500/20 rotate-3 hover:rotate-0 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-800 dark:text-white">Bienvenido</h2>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Accede a tu sesión efímera</p>
        </div>

        <div id="statusMessage" class="hidden mb-4 p-4 rounded-xl text-sm font-medium text-center animate-pulse"></div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 ml-1">Usuario</label>
                <input 
                    type="text" id="username" placeholder="admin"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2 ml-1">Contraseña</label>
                <div class="relative">
                    <input 
                        type="password" id="password" placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        required
                    >
                    <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500 transition-colors">
                        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.05 10.05 0 014.13-4.13m4.388-4.813A11.952 11.952 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21m-2.101-2.101L3 3" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-600 dark:text-slate-400 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 mr-2 bg-transparent">
                    Recordarme
                </label>
                <a href="#" class="text-blue-500 hover:text-blue-600 font-semibold transition-colors">¿Olvidaste tu clave?</a>
            </div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/30 transform transition-all active:scale-95"
            >
                Iniciar Sesión
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
            ¿Nuevo aquí? <a href="#" class="text-blue-500 font-bold hover:underline">Crea una cuenta</a>
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const statusMessage = document.getElementById('statusMessage');
            const themeToggle = document.getElementById('themeToggle');
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePassword');

            // --- Lógica de Modo Oscuro ---
            const toggleDarkMode = () => {
                document.documentElement.classList.toggle('dark');
                document.getElementById('sunIcon').classList.toggle('hidden');
                document.getElementById('moonIcon').classList.toggle('hidden');
            };

            themeToggle.addEventListener('click', toggleDarkMode);

            // Detectar preferencia del sistema al cargar
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                toggleDarkMode();
            }

            // --- Lógica de Mostrar/Ocultar Contraseña ---
            togglePasswordBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                
                document.getElementById('eyeOpen').classList.toggle('hidden', isPassword);
                document.getElementById('eyeClosed').classList.toggle('hidden', !isPassword);
            });

            // --- Manejo de Formulario ---
            const showMessage = (text, isError = true) => {
                statusMessage.textContent = text;
                statusMessage.className = `mb-4 p-4 rounded-xl text-sm font-medium text-center ${isError ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400' : 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400'}`;
                statusMessage.classList.remove('hidden');
            };

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const user = document.getElementById('username').value.trim();
                const pass = passwordInput.value.trim();

                if (user === 'admin' && pass === '123') {
                    showMessage('¡Acceso concedido! Preparando entorno...', false);
                    setTimeout(() => {
                        document.querySelector('.glass-card').innerHTML = `
                            <div class="text-center py-12 animate-in fade-in zoom-in duration-500">
                                <div class="text-6xl mb-6">🚀</div>
                                <h3 class="text-2xl font-bold dark:text-white">¡Hola de nuevo, ${user}!</h3>
                                <p class="text-slate-500 dark:text-slate-400 mt-2">Redirigiendo a tu chat privado...</p>
                                <div class="mt-8 flex justify-center">
                                    <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                </div>
                            </div>
                        `;
                    }, 1500);
                } else {
                    showMessage('Error: Usuario o contraseña incorrectos.');
                }
            });
        });
    </script>
</body>
</html>
